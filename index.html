<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Pseudo-3D Racer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    position: fixed;
  }
  
  #container {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%; height: 100%;
  }
  
  canvas {
    display: block;
    image-rendering: auto;
    border: 1px solid #222;
  }

  /* Touch controls */


    #touch-controls {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 45%;
       pointer-events: none;
    z-index: 10;
  }
  .touch-active #touch-controls {
    display: block;
  }

  .touch-btn {
    position: absolute;
    pointer-events: auto;
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.6);
    font-size: 24px;
    -webkit-tap-highlight-color: transparent;
  }

  .touch-btn:active { background: rgba(255,255,255,0.3); }
  #btn-left   { bottom: 8%; left: 6%;  width: 22vmin; height: 22vmin; max-width: 80px; max-height: 80px; }
  #btn-right  { bottom: 8%; left: 32%; width: 22vmin; height: 22vmin; max-width: 80px; max-height: 80px; }
  #btn-up     { bottom: 32%; right: 32%; width: 20vmin; height: 20vmin; max-width: 75px; max-height: 75px; }
  #btn-down   { bottom: 8%; right: 32%; width: 20vmin; height: 20vmin; max-width: 75px; max-height: 75px; }
  #btn-start  { bottom: 20%; left: 50%; transform: translateX(-50%); width: 50vmin; max-width: 160px; height: 44px; border-radius: 22px; font-size: 16px; }
  /* Landscape phone adjustments */
  @media (orientation: landscape) and (max-height: 500px) {
    #btn-left  { bottom: 5%; left: 2%;  width: 14vmin; height: 14vmin; max-width: 55px; max-height: 55px; }
    #btn-right { bottom: 5%; left: 22%; width: 14vmin; height: 14vmin; max-width: 55px; max-height: 55px; }
    #btn-up    { bottom: 28%; right: 22%; width: 13vmin; height: 13vmin; max-width: 50px; max-height: 50px; }
    #btn-down  { bottom: 5%;  right: 22%; width: 13vmin; height: 13vmin; max-width: 50px; max-height: 50px; }
  }

  </style>
</head>
<body>
  <div id="container">
  <canvas id="game"></canvas>
</div>

<div id="touch-controls">
  <button class="touch-btn" id="btn-left">◀</button>
  <button class="touch-btn" id="btn-right">▶</button>
  <button class="touch-btn" id="btn-up">▲</button>
  <button class="touch-btn" id="btn-down">▼</button>
  <button class="touch-btn" id="btn-start">START</button>
  </div>

<script>

//  CONFIGURATION


const VIRTUAL_W = 800;
const VIRTUAL_H = 500;
const ASPECT     = VIRTUAL_W / VIRTUAL_H;
const ROAD_ASPECT = 2000;
const SEGMENT_LEN = 200;
const DRWA_DIST = 300;
const FIELD_OF_VIEW = 400;
const CAMERA_H = 1500;
const MAX_SPEED = 400;
const ACCEL = 300;
const BRAKE      = 600;
const DRAG       = 0.97;
const STEER_SPEED = 3.0;
const CENTRIFUGAL = 0.3;
const OFF_ROAD_DECEL = 0.5;
const OFF_ROAD_DRAG  = 0.92;
const NITRO_MULT = 1.6;    // speed multiplier during nitro
const NITRO_DURATION = 2.5; // seconds
const MAX_PARTICLES = 200;
const OPPONENT_COUNT = 4;



//  RESPONSIVE CANVAS

const canvas = document.getElementById('game');
const ctx   = canvas.getContext('2d');
let W, H, RES = 1;


function resize() {
  const maxW = window.innerWidth;
  const maxH = window.innerHeight;
  let w, h;
  if (maxW / maxH > ASPECT) {
    h = maxH; w = h * ASPECT;
  } else {
    w = maxW; h = w / ASPECT;
  }
  // Use half-res on small screens for performance
  RES = (maxW < 500) ? 2 : 1;
  canvas.width  = w / RES;
  canvas.height = h / RES;
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';
  W = canvas.width;
  H = canvas.height;
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 100));


//  TOUCH DETECTION

const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
if (isTouchDevice) {
  document.body.classList.add('touch-active');
}

// Track Defination 

const TRACK_SECTIONS = [
  { count: 40, curve:  0.0, hill:  0.0 },
  { count: 30, curve:  0.3, hill:  0.0 },
  { count: 10, curve:  0.0, hill:  0.0 },
  { count: 20, curve:  1.2, hill:  0.0 },
  { count: 15, curve:  0.0, hill:  0.0 },
  { count: 25, curve:  -0.6, hill: 0.0 },
  { count: 30, curve:  -0.4, hill: 0.0 },
  { count: 20, curve:  0.0, hill:  0.5 },
  { count: 15, curve:  0.7, hill:  0.0 },
  { count: 15, curve: -0.7, hill:  0.0 },
  { count: 25, curve:  0.3, hill:  0.6 },
  { count: 35, curve:  0.0, hill: -0.5 },
  { count: 20, curve: -0.5, hill:  0.0 },

];


function buildTrack(sections) {
  const segments = [];
  let worldZ = 0, hillY = 0;
  for (const sec of sections) {
    for (let i = 0; i < sec.count; i++) {
      const idx = segments.length;
      segments.push({
        index: idx,
        p1:    { y: hillY, z: worldZ },
        p2:    { y: hillY + sec.hill, z: worldZ + SEGMENT_LEN },
        curve: sec.curve,
        hills: sec.hill,
        roadColor: idx % 2,
        sprites:   [],
        nitro:     false,   // nitro pickup on this segment
        screen:    { x: 0, y: 0, w: 0, scale: 0 },
      });
      hillY  += sec.hill;
      worldZ += SEGMENT_LEN;
    }
  }

  placeSprites(segments);
  placeNitro(segments);

  return { segments, totalLength: worldZ };
}

function placeSprites(segments) {
  const len = segments.length;
  for (let i = 0; i < len; i++) {
    const seg = segments[i];
    const prevSeg = segments[(i - 1 + len) % len];
    if (i % 3 === 0) {
      const side = (i % 6 < 3) ? -1 : 1;
      seg.sprites.push({ type: 'tree', offset: side * (1.2 + Math.sin(i * 0.7) * 0.4) });
    }
    if (i % 5 === 2) {
      const side = (i % 10 < 5) ? 1 : -1;
      seg.sprites.push({ type: 'tree', offset: side * (1.3 + Math.cos(i * 0.5) * 0.3) });
    }
    if (seg.curve !== 0 && prevSeg.curve === 0) {
      const side = seg.curve > 0 ? -1 : 1;
      seg.sprites.push({ type: 'sign', offset: side * 1.05 });
    }
    if (i % 7 === 4) {
      seg.sprites.push({ type: 'bush', offset: (i % 2 === 0 ? -1 : 1) * (1.5 + Math.sin(i) * 0.3) });
    }
  }
}


function placeNitro(segments) {
  // Place nitro pickups on straights and gentle curves, roughly every ~40 segments
  const len = segments.length;
  for (let i = 5; i < len; i += 37) {
    // Only on relatively straight sections
    if (Math.abs(segments[i].curve) < 0.4) {
      segments[i].nitro = true;
    }
  }
}

const TRACK = buildTrack(TRACK_SECTIONS);
const TOTAL_SEGMENTS = TRACK.segments.length;



//  GAME STATE

const STATE = {
  position:    0,
  speed:       0,
  steering:    0,
  cameraDx:   0,

  input: { accelerate: false, brake: false, left: false, right: false },

  lapTime:     0,
  raceTime:    0,
  bestLap:     Infinity,
  currentLap:  0,
  maxLaps:     3,
  lapProgress: 0,

  state:       'waiting',
  countdown:   3,
  countdownTimer: 0,

  lastTime:    0,
  fps:         0, fpsFrames: 0, fpsTime: 0,

  offRoad:     false,
  offRoadTimer: 0,
  shakeX: 0, shakeY: 0,


  // Nitro
  nitroActive: false,
  nitroTimer:  0,
  nitroCollected: 0,

  // Opponents passed
  opponentsPassed: 0,
};


//  OPPONENT CARS.  

function createOpponents() {
  const opponents = [];
  const colors = ['#2266cc', '#44aa22', '#cc8800', '#aa44cc'];
  const baseSpeeds = [180, 210, 240, 270]; // varying difficulty
  const lanes = [-0.4, 0.3, -0.2, 0.35];  // lane offsets (-0.5..0.5)
  const startOffsets = [0.15, 0.3, 0.5, 0.65]; // start spread around track

  for (let i = 0; i < OPPONENT_COUNT; i++) {
    opponents.push({
      position: TRACK.totalLength * startOffsets[i],
      speed: baseSpeeds[i] + (Math.random() - 0.5) * 40,
      laneOffset: lanes[i],
      color: colors[i],
      wobble: Math.random() * Math.PI * 2, // for lane variation
      wobbleSpeed: 0.3 + Math.random() * 0.4,
      screen: { x: 0, y: 0, w: 0, scale: 0 },
    });
  }
  return opponents;
}

let opponents = createOpponents();

//  PARTICLE SYSTEM

const particles = [];

function spawnParticle(x, y, vx, vy, life, color, size) {
  if (particles.length >= MAX_PARTICLES) particles.shift();
  particles.push({ x, y, vx, vy, life, maxLife: life, color, size });
}

function spawnSmoke(x, y, scale) {
  const count = 3 + Math.floor(Math.random() * 5);
  for (let i = 0; i < count; i++){
    spawnParticle(
      x + (Math.random() - 0.5) * 20 * scale,
      y + (Math.random() - 0.5) * 10 * scale,
      (Math.random() - 0.5) * 40 * scale,
      -(20 + Math.random() * 40) * scale,
      0.3 + Math.random() * 0.5,
      `rgba(${180+Math.random()*75},${180+Math.random()*75},${180+Math.random()*75},0.6)`,
      3 * scale + Math.random() * 5 * scale
    );
  }
}


function spawnSparks(x, y, scale) {
  const count = 3 + Math.floor(Math.random() * 5);
  for (let i = 0; i < count; i++) {
    spawnParticle(
      x, y,
      (Math.random() - 0.5) * 100 * scale,
      (Math.random() - 0.5) * 100 * scale - 30 * scale,
      0.15 + Math.random() * 0.3,
      Math.random() > 0.5 ? '#ffaa00' : '#ff4400',
      1.5 * scale + Math.random() * 3 * scale
    );
  }
}

function spawnNitroFlame(x, y, scale) {
  const count = 5 + Math.floor(Math.random() * 8);
  for (let i = 0; i < count; i++) {
    spawnParticle(
      x + (Math.random() - 0.5) * 15 * scale,
      y,
      (Math.random() - 0.5) * 30 * scale,
      -(40 + Math.random() * 80) * scale,
      0.2 + Math.random() * 0.4,
      Math.random() > 0.5 ? '#00ccff' : '#0066ff',
      2 * scale + Math.random() * 6 * scale
    );
  }

}


function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}


function renderParticles() {
  for (const p of particles) {
    const alpha = Math.max(0, p.life / p.maxLife);
    const color = p.color.replace(/[\d.]+\)$/, `${alpha * 0.8})`);
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (0.3 + alpha * 0.7), 0, Math.PI * 2);
    ctx.fill();
  }
}


//  INPUT HANDLING


function setInput(key, down) {
  switch(key) {
    case 'up':    STATE.input.accelerate = down; break;
    case 'down':  STATE.input.brake = down; break;
    case 'left':  STATE.input.brake = down; break;
    case 'right': STATE.input.brake = down; break;
  }
}

document.addEventListener('keydown', (e) => {
  switch (e.code) {
    case 'ArrowUp':    case 'KeyW': setInput('up', true); break;
    case 'ArrowDown':  case 'KeyS': setInput('down', true); break;
    case 'ArrowLeft':  case 'KeyA': setInput('left', true); break;
    case 'ArrowRight': case 'KeyD': setInput('right', true); break;
    case 'Space': case 'Enter':
       if (STATE.state === 'waiting') startCountdown();
      else if (STATE.state === 'finished') resetRace();
      break;
      case 'KeyN' // N for Nitro

      activateNitro();
      break;
    default: return;
  }
  e.preventDefault();
});


document.addEventListener('keyup', (e) => {
  switch (e.code) {
    case 'ArrowUp':    case 'KeyW': setInput('up', false); break;
    case 'ArrowDown':  case 'KeyS': setInput('down', false); break;
    case 'ArrowLeft':  case 'KeyA': setInput('left', false); break;
    case 'ArrowRight': case 'KeyD': setInput('right', false); break;
    default: return;
  }
  e.preventDefault();
});

// Touch controls

function setupTouchButton(id, key) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.addEventListener('pointerdown', (e) => { e.preventDefault(); setInput(key, true); });
  btn.addEventListener('pointerup',   (e) => { e.preventDefault(); setInput(key, false); });
  btn.addEventListener('pointerleave',(e) => { setInput(key, false); });
  btn.addEventListener('pointercancel',(e)=>{ setInput(key, false); });
}

setupTouchButton('btn-left',  'left');
setupTouchButton('btn-right', 'right');
setupTouchButton('btn-up',    'up');
setupTouchButton('btn-down',  'down');

const btnStart = document.getElementById('btn-start');
if (btnStart) {
  btnStart.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    if (STATE.state === 'waiting') startCountdown();
    else if (STATE.state === 'finished') resetRace();
  });
}


// Update start button text

setInterval(() => {
    if (btnStart.style.display === 'none') return;
    if (STATE.state === 'waiting') btnStart.textContent = 'START';
    else if (STATE.state === 'finished') btnStart.textContent = 'AGAIN';
    else btnStart.style.display = 'none';
  }, 200);


//  RACE STATE MACHINE

function startCountdown() {
  STATE.state = 'countdown';
  STATE.countdown = 3;
  STATE.countdownTimer = 0;
  STATE.speed = 0;
  STATE.position = 0;
  STATE.cameraDx = 0;
  STATE.steering  = 0;
  STATE.lapTime   = 0;
  STATE.raceTime  = 0;
  STATE.currentLap = 0;
  STATE.lapProgress = 0;
  STATE.nitroActive = false;
  STATE.nitroTimer = 0;
  STATE.nitroCollected = 0;
  STATE.opponentsPassed = 0;
  opponents = createOpponents();
  particles.length = 0;
  if (isTouchDevice) document.getElementById('btn-start').style.display = 'none';
}

function startRace() {
  STATE.state = 'racing';
  STATE.lastTime = performance.now();
}

function finishRace() {
  STATE.state = 'finished';
  if (STATE.lapTime < STATE.bestLap) {
    STATE.bestLap = STATE.lapTime;
  }

  if (isTouchDevice) {
    const btn = document.getElementById('btn-start');
    btn.style.display = 'block';
    btn.textContent = 'AGAIN';
    }
}


function resetRace() {
  STATE.state     = 'waiting';
  STATE.speed    = 0;
  STATE.position = 0;
  STATE.cameraDx = 0;
  STATE.steering  = 0;
  STATE.lapTime   = 0;
  STATE.raceTime  = 0;
  STATE.currentLap = 0;
  STATE.lapProgress = 0;
  STATE.offRoad   = false;
  STATE.offRoadTimer = 0;
  STATE.shakeX = 0; STATE.shakeY = 0;
  STATE.nitroActive = false;
  STATE.nitroTimer = 0;
  STATE.nitroCollected = 0;
  STATE.opponentsPassed = 0;
  opponents = createOpponents();
  particles.length = 0;

  if (isTouchDevice) {
    const btn = document.getElementById('btn-start');
    btn.style.display = 'block';
    btn.textContent = 'START';
  }
}


function activateNitro() {
  if (STATE.state !== 'racing') return;
  if (STATE.nitroTimer > 0 || STATE.nitroActive) return; // already active
  if (STATE.nitroCollected <= 0) return; // none collected
  STATE.nitroCollected--;
  STATE.nitroActive = true;
  STATE.nitroTimer = NITRO_DURATION;
}


//  PHYSICS UPDATE

function update(dt) {
  if (STATE.state !== 'racing') return;
  const clamped = Math.min(dt, 0.1);

  // Steering smoothing

  const targetSteer = (STATE.input.right ? 1 : 0) - (STATE.input.left ? 1 : 0);
  STATE.steering += (targetSteer - STATE.steering) * Math.min(STEER_SPEED * clamped, 1);

  const speedRatio = STATE.speed / MAX_SPEED;
  const maxSteer   = 1.5 * (1 - speedRatio * 0.5);

  // Nitro timer
  if (STATE.nitroActive) {
    STATE.nitroTimer -= clamped;
    if (STATE.nitroTimer <= 0) {
      STATE.nitroActive = false;
      STATE.nitroTimer = 0;
    }
  }

  // Effective max speed
  const effectiveMax = STATE.nitroActive ? MAX_SPEED * NITRO_MULT : MAX_SPEED;


// Acceleration / braking
  if (STATE.input.accelerate) {
    STATE.speed += ACCEL * clamped * (STATE.nitroActive ? 1.5 : 1);
  } else if (STATE.input.brake) {
    STATE.speed -= BRAKE * clamped;
    if (STATE.speed < 0) STATE.speed = 0;
  } else {
    const dragCoeff = STATE.offRoad ? OFF_ROAD_DRAG : DRAG;
    STATE.speed *= Math.pow(dragCoeff, clamped * 60);
  }
  STATE.speed = Math.max(0, Math.min(STATE.speed, effectiveMax));


  if (STATE.input.accelerate) {
    STATE.speed += ACCEL * clamped * (STATE.nitroActive ? 1.5 : 1);

  }
   vbuby


  // Off-road handling
  if (STATE.offRoad && STATE.speed > 0) {
    STATE.speed *= Math.pow(OFF_ROAD_DECEL, clamped * 60);
    STATE.offRoadTimer -= clamped;
    if (STATE.offRoadTimer <= 0) STATE.offRoad = false;
  }

  // Position update
  const segIdx = Math.floor(STATE.position / SEGMENT_LEN) % TOTAL_SEGMENTS;
  const seg    = TRACK.segments[segIdx];

  // 
  // Curve force
  const curveForce = seg.curve * STATE.speed * CENTRIFUGAL;
  STATE.cameraDx -= curveForce * clamped;

// Steering
  STATE.cameraDx += STATE.steering * maxSteer * STATE.speed * clamped;
  
  
  // Forward progress
  STATE.position += STATE.speed * clamped * (STATE.offRoad ? 0.7 : 1.0);


  // off road. detection

  const halfRoad = ROAD_WIDTH / 2;
  if (Math.abs(STATE.cameraDx) > halfRoad * 0.9) {
    if (!STATE.offRoad) { STATE.offRoad = true; STATE.offRoadTimer = 0.15; }
    else ( STATE.offRoad && STATE.speed > 0 )
    STATE.speed *= Math.pow(OFF_ROAD_DECEL, clamped * 60);
    STATE.offRoadTimer -= clamped;
    if (STATE.offRoadTimer <= 0) STATE.offRoad = false;
  }

  // Nitro pickup detection
  if (seg.nitro && !STATE.nitroActive && STATE.nitroTimer <= 0) {
    // Player is on a nitro segment — collect it
    if (Math.abs(STATE.cameraDx) < halfRoad * 0.7) {
      seg.nitro = false; // consumed
      STATE.nitroCollected++;
    }
  }


   // --- Opponent AI ---

   for (const opp of opponents) {
    opp.position += opp.speed * clamped;
     //lane wobble 

    opp.wobble += opp.wobbleSpeed * clamped;
    opp.laneOffset += Math.sin(opp.wobble) * 0.001;
    opp.laneOffset = Math.max(-0.45, Math.min(0.45, oppo.laneOffset));

    // Detect opponent overtake

    const playerPos = STATE.position % TRACK.totalLength;
    const oppoPos = opp.position % TRACK.totalLength;

// Simple detection: if player is close behind and then ahead.  // // We'll handle this in the render/hud via distance comparison
  }

  //  --- Lap detection ---
  const prevProgress = STATE.lapProgress;
  STATE.lapProgress = (STATE.position % TRACK.totalLength) / TRACK.totalLength();

  if (prevProgress > 0.9 && STATE.lapProgress < 0.1) {
    if (STATE.currentLap > 0) {
      if (STATE.lapTime < STATE.bestLap) STATE.bestLap = STATE.lapTime;
    }
    STATE.currentLap++;
    STATE.lapTime = 0;
    if (STATE.currentLap >= STATE.maxLaps) {
      finishRace();
    }
  }

  if(STATE.state === 'racing') {
    STATE.lapTime += clamped;
    STATE.raceTime += clamped;
  }


// particle 

updateParticles(dt);


// Spawn tire smoke when accelerating hard

if (STATE.input.accelerate && STATE.speed > 100 && Math.random() < 0.3){
  spawnSmoke(W / 2 + STATE.steering * 25, H * 0.85, 0.5 + STATE.speed / MAX_SPEED * 0.8);
  }


  // Nitro flames

  if (STATE.nitroActive && Math.random() < 0.7) {
    spawnNitroFlame(W / 2 + (Math.random() - 0.5) * 20, H * 0.88, 0.6);
  }

   // Off-road dust

   if (STATE.offRoad) {
    spawnNitroFlame(W / 2 +(Math.random() - 0.5) * 60, H * 0.8, 0.4);
  }


  // Rumble sparks when near edge
if (Math.abs(STATE.cameraDx) > halfRoad * 0.7 && Math.abs(STATE.cameraDx) < halfRoad * 0.95 && Math.random() < 0.2) {
  spawnSparks(W / 2 + (STATE.cameraDx > 0 ? 1 : -1) * 100, H * 0.82, 0.3);
  }
}


//  RENDERING


function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, H * 0.55);
  grad.addColorStop(0,    '#0a0a2e');
  grad.addColorStop(0.5,  '#1a1a4e');
  grad.addColorStop(0.85, '#4a6fa5');
  grad.addColorStop(1,    '#87CEEB');
  ctx.fillStyle = grad;

  const sunX = W * 0.75, sunY = H * 0.18, sunR = 30 / RES;
  const glow = ctx.createRadialGradient(sunX, sunY, sunR * 0.5, sunX, sunY, sunR * 3);
  glow.addColorStop(0, 'rgba(255,255,200,0.9)');
  glow.addColorStop(0.5, 'rgba(255,200,100,0.3)');
  glow.addColorStop(1, 'rgba(255,150,50,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(sunX - sunR * 3, sunY - sunR * 3, sunR * 6, sunR * 6);
  ctx.fillStyle = '#fffde0';
  ctx.beginPath(); ctx.arc(sunX, sunY, sunR, 0, Math.PI * 2); ctx.fill();
}
function drawMountains(cameraDx) {
  const horizonY = H * 0.42;
  const parallax = cameraDx * 0.0005;

   // Back mountains

   ctx.fillStyle = '#3a506b';
   ctx.beginPath(); ctx.moveTo(0, H);

   const peak = 12 ;
   or (let i = 0; i <= peaks; i++) {
    const x = (i / peaks) * W;
    const nh = Math.sin(i * 1.7 + 0.3) * 25 + Math.sin(i * 3.1 + 1.2) * 15 + 35;
    ctx.lineTo(x + parallax * 30, horizonY - nh / RES + (i % 3 === 0 ? -15 / RES : 0));
  }

  ctx.lineTo(W, H); ctx.closePath(); ctx.fill();

  // Front mountains
