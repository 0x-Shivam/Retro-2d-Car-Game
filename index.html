<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Pseudo-3D Racer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    position: fixed;
  }
  
  #container {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%; height: 100%;
  }
  
  canvas {
    display: block;
    image-rendering: auto;
    border: 1px solid #222;
  }

  /* Touch controls */


    #touch-controls {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 45%;
       pointer-events: none;
    z-index: 10;
  }
  .touch-active #touch-controls {
    display: block;
  }

  .touch-btn {
    position: absolute;
    pointer-events: auto;
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.6);
    font-size: 24px;
    -webkit-tap-highlight-color: transparent;
  }

  .touch-btn:active { background: rgba(255,255,255,0.3); }
  #btn-left   { bottom: 8%; left: 6%;  width: 22vmin; height: 22vmin; max-width: 80px; max-height: 80px; }
  #btn-right  { bottom: 8%; left: 32%; width: 22vmin; height: 22vmin; max-width: 80px; max-height: 80px; }
  #btn-up     { bottom: 32%; right: 32%; width: 20vmin; height: 20vmin; max-width: 75px; max-height: 75px; }
  #btn-down   { bottom: 8%; right: 32%; width: 20vmin; height: 20vmin; max-width: 75px; max-height: 75px; }
  #btn-start  { bottom: 20%; left: 50%; transform: translateX(-50%); width: 50vmin; max-width: 160px; height: 44px; border-radius: 22px; font-size: 16px; }
  /* Landscape phone adjustments */
  @media (orientation: landscape) and (max-height: 500px) {
    #btn-left  { bottom: 5%; left: 2%;  width: 14vmin; height: 14vmin; max-width: 55px; max-height: 55px; }
    #btn-right { bottom: 5%; left: 22%; width: 14vmin; height: 14vmin; max-width: 55px; max-height: 55px; }
    #btn-up    { bottom: 28%; right: 22%; width: 13vmin; height: 13vmin; max-width: 50px; max-height: 50px; }
    #btn-down  { bottom: 5%;  right: 22%; width: 13vmin; height: 13vmin; max-width: 50px; max-height: 50px; }
  }

  </style>
</head>
<body>
  <div id="container">
  <canvas id="game"></canvas>
</div>

<div id="touch-controls">
  <button class="touch-btn" id="btn-left">◀</button>
  <button class="touch-btn" id="btn-right">▶</button>
  <button class="touch-btn" id="btn-up">▲</button>
  <button class="touch-btn" id="btn-down">▼</button>
  <button class="touch-btn" id="btn-start">START</button>
  </div>

<script>

//  CONFIGURATION


const VIRTUAL_W  = 800;   // virtual canvas width (all coords in this space)
const VIRTUAL_H  = 500;
const ASPECT     = VIRTUAL_W / VIRTUAL_H;
const ROAD_WIDTH = 2000;
const SEGMENT_LEN = 200;
const DRAW_DIST  = 300;
const FIELD_OF_VIEW = 400;
const CAMERA_H   = 1500;
const MAX_SPEED  = 400;
const ACCEL      = 300;
const BRAKE      = 600;
const DRAG       = 0.97;
const STEER_SPEED = 3.0;
const CENTRIFUGAL = 0.3;
const OFF_ROAD_DECEL = 0.5;
const OFF_ROAD_DRAG  = 0.92;
const NITRO_MULT = 1.6;    // speed multiplier during nitro
const NITRO_DURATION = 2.5; // seconds
const MAX_PARTICLES = 200;
const OPPONENT_COUNT = 4;

// =============================================================================
//  RESPONSIVE CANVAS
// =============================================================================
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
let W, H, RES = 1;

function resize() {
  const maxW = window.innerWidth;
  const maxH = window.innerHeight;
  let w, h;
  if (maxW / maxH > ASPECT) {
    h = maxH; w = h * ASPECT;
  } else {
    w = maxW; h = w / ASPECT;
  }
  // Use half-res on small screens for performance
  RES = (maxW < 500) ? 2 : 1;
  canvas.width  = w / RES;
  canvas.height = h / RES;
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';
  W = canvas.width;
  H = canvas.height;
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 100));

// =============================================================================
//  TOUCH DETECTION
// =============================================================================
const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
if (isTouchDevice) {
  document.body.classList.add('touch-active');
}

// =============================================================================
//  TRACK DEFINITION
// =============================================================================
const TRACK_SECTIONS = [
  { count: 40, curve:  0.0, hill:  0.0 },
  { count: 30, curve:  0.3, hill:  0.0 },
  { count: 10, curve:  0.0, hill:  0.0 },
  { count: 20, curve:  1.2, hill: -0.5 },
  { count: 15, curve:  0.0, hill:  0.8 },
  { count: 25, curve: -0.6, hill: -0.4 },
  { count: 30, curve: -0.4, hill:  0.0 },
  { count: 20, curve:  0.0, hill:  0.5 },
  { count: 15, curve:  0.7, hill:  0.0 },
  { count: 15, curve: -0.7, hill:  0.0 },
  { count: 25, curve:  0.3, hill:  0.6 },
  { count: 35, curve:  0.0, hill: -0.5 },
  { count: 20, curve: -0.5, hill:  0.0 },
];

// =============================================================================
//  BUILD TRACK
// =============================================================================
function buildTrack(sections) {
  const segments = [];
  let worldZ = 0, hillY = 0;
  for (const sec of sections) {
    for (let i = 0; i < sec.count; i++) {
      const idx = segments.length;
      segments.push({
        index: idx,
        p1:    { y: hillY, z: worldZ },
        p2:    { y: hillY + sec.hill, z: worldZ + SEGMENT_LEN },
        curve: sec.curve,
        hills: sec.hill,
        roadColor: idx % 2,
        sprites:   [],
        nitro:     false,   // nitro pickup on this segment
        screen:    { x: 0, y: 0, w: 0, scale: 0 },
      });
      hillY  += sec.hill;
      worldZ += SEGMENT_LEN;
    }
  }

  placeSprites(segments);
  placeNitro(segments);

  return { segments, totalLength: worldZ };
}

function placeSprites(segments) {
  const len = segments.length;
  for (let i = 0; i < len; i++) {
    const seg = segments[i];
    const prevSeg = segments[(i - 1 + len) % len];

    if (i % 3 === 0) {
      const side = (i % 6 < 3) ? -1 : 1;
      seg.sprites.push({ type: 'tree', offset: side * (1.2 + Math.sin(i * 0.7) * 0.4) });
    }
    if (i % 5 === 2) {
      const side = (i % 10 < 5) ? 1 : -1;
      seg.sprites.push({ type: 'tree', offset: side * (1.3 + Math.cos(i * 0.5) * 0.3) });
    }
    if (seg.curve !== 0 && prevSeg.curve === 0) {
      const side = seg.curve > 0 ? -1 : 1;
      seg.sprites.push({ type: 'sign', offset: side * 1.05 });
    }
    if (i % 7 === 4) {
      seg.sprites.push({ type: 'bush', offset: (i % 2 === 0 ? -1 : 1) * (1.5 + Math.sin(i) * 0.3) });
    }
  }
}

function placeNitro(segments) {
  // Place nitro pickups on straights and gentle curves, roughly every ~40 segments
  const len = segments.length;
  for (let i = 5; i < len; i += 37) {
    // Only on relatively straight sections
    if (Math.abs(segments[i].curve) < 0.4) {
      segments[i].nitro = true;
    }
  }
}

const TRACK = buildTrack(TRACK_SECTIONS);
const TOTAL_SEGMENTS = TRACK.segments.length;

// =============================================================================
//  GAME STATE
// =============================================================================
const STATE = {
  position:    0,
  speed:       0,
  steering:    0,
  cameraDx:   0,

  input: { accelerate: false, brake: false, left: false, right: false },

  lapTime:     0,
  raceTime:    0,
  bestLap:     Infinity,
  currentLap:  0,
  maxLaps:     3,
  lapProgress: 0,

  state:       'waiting',
  countdown:   3,
  countdownTimer: 0,

  lastTime:    0,
  fps:         0, fpsFrames: 0, fpsTime: 0,

  offRoad:     false,
  offRoadTimer: 0,
  shakeX: 0, shakeY: 0,

  // Nitro
  nitroActive: false,
  nitroTimer:  0,
  nitroCollected: 0,

  // Opponents passed
  opponentsPassed: 0,
};

// =============================================================================
//  OPPONENT CARS
// =============================================================================
function createOpponents() {
  const opponents = [];
  const colors = ['#2266cc', '#44aa22', '#cc8800', '#aa44cc'];
  const baseSpeeds = [180, 210, 240, 270]; // varying difficulty
  const lanes = [-0.4, 0.3, -0.2, 0.35];  // lane offsets (-0.5..0.5)
  const startOffsets = [0.15, 0.3, 0.5, 0.65]; // start spread around track

  for (let i = 0; i < OPPONENT_COUNT; i++) {
    opponents.push({
      position: TRACK.totalLength * startOffsets[i],
      speed: baseSpeeds[i] + (Math.random() - 0.5) * 40,
      laneOffset: lanes[i],
      color: colors[i],
      wobble: Math.random() * Math.PI * 2, // for lane variation
      wobbleSpeed: 0.3 + Math.random() * 0.4,
      screen: { x: 0, y: 0, w: 0, scale: 0 },
    });
  }
  return opponents;
}

let opponents = createOpponents();

// =============================================================================
//  PARTICLE SYSTEM
// =============================================================================
const particles = [];

function spawnParticle(x, y, vx, vy, life, color, size) {
  if (particles.length >= MAX_PARTICLES) particles.shift();
  particles.push({ x, y, vx, vy, life, maxLife: life, color, size });
}

function spawnSmoke(x, y, scale) {
  const count = 2 + Math.floor(Math.random() * 3);
  for (let i = 0; i < count; i++) {
    spawnParticle(
      x + (Math.random() - 0.5) * 20 * scale,
      y + (Math.random() - 0.5) * 10 * scale,
      (Math.random() - 0.5) * 40 * scale,
      -(20 + Math.random() * 40) * scale,
      0.3 + Math.random() * 0.5,
      `rgba(${180+Math.random()*75},${180+Math.random()*75},${180+Math.random()*75},0.6)`,
      3 * scale + Math.random() * 5 * scale
    );
  }
}

function spawnSparks(x, y, scale) {
  const count = 3 + Math.floor(Math.random() * 5);
  for (let i = 0; i < count; i++) {
    spawnParticle(
      x, y,
      (Math.random() - 0.5) * 100 * scale,
      (Math.random() - 0.5) * 100 * scale - 30 * scale,
      0.15 + Math.random() * 0.3,
      Math.random() > 0.5 ? '#ffaa00' : '#ff4400',
      1.5 * scale + Math.random() * 3 * scale
    );
  }
}

function spawnNitroFlame(x, y, scale) {
  const count = 5 + Math.floor(Math.random() * 8);
  for (let i = 0; i < count; i++) {
    spawnParticle(
      x + (Math.random() - 0.5) * 15 * scale,
      y,
      (Math.random() - 0.5) * 30 * scale,
      -(40 + Math.random() * 80) * scale,
      0.2 + Math.random() * 0.4,
      Math.random() > 0.5 ? '#00ccff' : '#0066ff',
      2 * scale + Math.random() * 6 * scale
    );
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function renderParticles() {
  for (const p of particles) {
    const alpha = Math.max(0, p.life / p.maxLife);
    const color = p.color.replace(/[\d.]+\)$/, `${alpha * 0.8})`);
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (0.3 + alpha * 0.7), 0, Math.PI * 2);
    ctx.fill();
  }
}

// =============================================================================
//  INPUT HANDLING
// =============================================================================
function setInput(key, down) {
  switch (key) {
    case 'up':    STATE.input.accelerate = down; break;
    case 'down':  STATE.input.brake      = down; break;
    case 'left':  STATE.input.left       = down; break;
    case 'right': STATE.input.right      = down; break;
  }
}

document.addEventListener('keydown', (e) => {
  switch (e.code) {
    case 'ArrowUp':    case 'KeyW': setInput('up', true); break;
    case 'ArrowDown':  case 'KeyS': setInput('down', true); break;
    case 'ArrowLeft':  case 'KeyA': setInput('left', true); break;
    case 'ArrowRight': case 'KeyD': setInput('right', true); break;
    case 'Space': case 'Enter':
      if (STATE.state === 'waiting') startCountdown();
      else if (STATE.state === 'finished') resetRace();
      break;
    case 'KeyN': // N for nitro (keyboard shortcut)
      activateNitro();
      break;
    default: return;
  }
  e.preventDefault();
});

document.addEventListener('keyup', (e) => {
  switch (e.code) {
    case 'ArrowUp':    case 'KeyW': setInput('up', false); break;
    case 'ArrowDown':  case 'KeyS': setInput('down', false); break;
    case 'ArrowLeft':  case 'KeyA': setInput('left', false); break;
    case 'ArrowRight': case 'KeyD': setInput('right', false); break;
    default: return;
  }
  e.preventDefault();
});

// Touch controls
function setupTouchButton(id, key) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.addEventListener('pointerdown', (e) => { e.preventDefault(); setInput(key, true); });
  btn.addEventListener('pointerup',   (e) => { e.preventDefault(); setInput(key, false); });
  btn.addEventListener('pointerleave',(e) => { setInput(key, false); });
  btn.addEventListener('pointercancel',(e)=>{ setInput(key, false); });
}

setupTouchButton('btn-left',  'left');
setupTouchButton('btn-right', 'right');
setupTouchButton('btn-up',    'up');
setupTouchButton('btn-down',  'down');

const btnStart = document.getElementById('btn-start');
if (btnStart) {
  btnStart.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    if (STATE.state === 'waiting') startCountdown();
    else if (STATE.state === 'finished') resetRace();
  });
  // Update start button text
  setInterval(() => {
    if (btnStart.style.display === 'none') return;
    if (STATE.state === 'waiting') btnStart.textContent = 'START';
    else if (STATE.state === 'finished') btnStart.textContent = 'AGAIN';
    else btnStart.style.display = 'none';
  }, 200);
}

// =============================================================================
//  RACE STATE MACHINE
// =============================================================================
function startCountdown() {
  STATE.state     = 'countdown';
  STATE.countdown = 3;
  STATE.countdownTimer = 0;
  STATE.speed     = 0;
  STATE.position  = 0;
  STATE.cameraDx  = 0;
  STATE.steering  = 0;
  STATE.lapTime   = 0;
  STATE.raceTime  = 0;
  STATE.currentLap = 0;
  STATE.lapProgress = 0;
  STATE.nitroActive = false;
  STATE.nitroTimer = 0;
  STATE.nitroCollected = 0;
  STATE.opponentsPassed = 0;
  opponents = createOpponents();
  particles.length = 0;
  if (isTouchDevice) document.getElementById('btn-start').style.display = 'none';
}

function startRace() {
  STATE.state    = 'racing';
  STATE.lastTime = performance.now();
}

function finishRace() {
  STATE.state = 'finished';
  if (STATE.lapTime < STATE.bestLap) {
    STATE.bestLap = STATE.lapTime;
  }
  if (isTouchDevice) {
    const btn = document.getElementById('btn-start');
    btn.style.display = 'block';
    btn.textContent = 'AGAIN';
  }
}

function resetRace() {
  STATE.state     = 'waiting';
  STATE.speed     = 0;
  STATE.position  = 0;
  STATE.cameraDx  = 0;
  STATE.steering  = 0;
  STATE.lapTime   = 0;
  STATE.raceTime  = 0;
  STATE.currentLap = 0;
  STATE.lapProgress = 0;
  STATE.offRoad   = false;
  STATE.offRoadTimer = 0;
  STATE.shakeX = 0; STATE.shakeY = 0;
  STATE.nitroActive = false;
  STATE.nitroTimer = 0;
  STATE.nitroCollected = 0;
  STATE.opponentsPassed = 0;
  opponents = createOpponents();
  particles.length = 0;
  if (isTouchDevice) {
    const btn = document.getElementById('btn-start');
    btn.style.display = 'block';
    btn.textContent = 'START';
  }
}

function activateNitro() {
  if (STATE.state !== 'racing') return;
  if (STATE.nitroTimer > 0 || STATE.nitroActive) return; // already active
  if (STATE.nitroCollected <= 0) return; // none collected
  STATE.nitroCollected--;
  STATE.nitroActive = true;
  STATE.nitroTimer = NITRO_DURATION;
}

// =============================================================================
//  PHYSICS UPDATE
// =============================================================================
function update(dt) {
  if (STATE.state !== 'racing') return;
  const clamped = Math.min(dt, 0.1);

  // Steering smoothing
  const targetSteer = (STATE.input.right ? 1 : 0) - (STATE.input.left ? 1 : 0);
  STATE.steering += (targetSteer - STATE.steering) * Math.min(STEER_SPEED * clamped, 1);

  const speedRatio = STATE.speed / MAX_SPEED;
  const maxSteer   = 1.5 * (1 - speedRatio * 0.5);

  // Nitro timer
  if (STATE.nitroActive) {
    STATE.nitroTimer -= clamped;
    if (STATE.nitroTimer <= 0) {
      STATE.nitroActive = false;
      STATE.nitroTimer = 0;
    }
  }

  // Effective max speed
  const effectiveMax = STATE.nitroActive ? MAX_SPEED * NITRO_MULT : MAX_SPEED;

  // Acceleration / braking
  if (STATE.input.accelerate) {
    STATE.speed += ACCEL * clamped * (STATE.nitroActive ? 1.5 : 1);
  } else if (STATE.input.brake) {
    STATE.speed -= BRAKE * clamped;
    if (STATE.speed < 0) STATE.speed = 0;
  } else {
    const dragCoeff = STATE.offRoad ? OFF_ROAD_DRAG : DRAG;
    STATE.speed *= Math.pow(dragCoeff, clamped * 60);
  }
  STATE.speed = Math.max(0, Math.min(STATE.speed, effectiveMax));

  // Off-road handling
  if (STATE.offRoad && STATE.speed > 0) {
    STATE.speed *= Math.pow(OFF_ROAD_DECEL, clamped * 60);
    STATE.offRoadTimer -= clamped;
    if (STATE.offRoadTimer <= 0) STATE.offRoad = false;
  }

  // Position update
  const segIdx = Math.floor(STATE.position / SEGMENT_LEN) % TOTAL_SEGMENTS;
  const seg    = TRACK.segments[segIdx];

  // Curve force
  const curveForce = seg.curve * STATE.speed * CENTRIFUGAL;
  STATE.cameraDx -= curveForce * clamped;

  // Steering
  STATE.cameraDx += STATE.steering * maxSteer * STATE.speed * clamped;

  // Forward progress
  STATE.position += STATE.speed * clamped * (STATE.offRoad ? 0.7 : 1.0);

  // Off-road detection
  const halfRoad = ROAD_WIDTH / 2;
  if (Math.abs(STATE.cameraDx) > halfRoad * 0.9) {
    if (!STATE.offRoad) { STATE.offRoad = true; STATE.offRoadTimer = 0.15; }
    else { STATE.offRoadTimer = Math.max(STATE.offRoadTimer, 0.05); }
    STATE.shakeX = (Math.random() - 0.5) * 8;
    STATE.shakeY = (Math.random() - 0.5) * 8;
  } else {
    STATE.shakeX *= 0.8; STATE.shakeY *= 0.8;
  }

  // Nitro pickup detection
  if (seg.nitro && !STATE.nitroActive && STATE.nitroTimer <= 0) {
    // Player is on a nitro segment — collect it
    if (Math.abs(STATE.cameraDx) < halfRoad * 0.7) {
      seg.nitro = false; // consumed
      STATE.nitroCollected++;
    }
  }

  // --- Opponent AI ---
  for (const opp of opponents) {
    opp.position += opp.speed * clamped;
    // Lane wobble
    opp.wobble += opp.wobbleSpeed * clamped;
    opp.laneOffset += Math.sin(opp.wobble) * 0.001;
    opp.laneOffset = Math.max(-0.45, Math.min(0.45, opp.laneOffset));

    // Detect opponent overtake
    const playerPos = STATE.position % TRACK.totalLength;
    const oppPos = opp.position % TRACK.totalLength;
    // Simple detection: if player is close behind and then ahead
    // We'll handle this in the render/hud via distance comparison
  }

  // --- Lap detection ---
  const prevProgress = STATE.lapProgress;
  STATE.lapProgress  = (STATE.position % TRACK.totalLength) / TRACK.totalLength;

  if (prevProgress > 0.9 && STATE.lapProgress < 0.1) {
    if (STATE.currentLap > 0) {
      if (STATE.lapTime < STATE.bestLap) STATE.bestLap = STATE.lapTime;
    }
    STATE.currentLap++;
    STATE.lapTime = 0;
    if (STATE.currentLap >= STATE.maxLaps) {
      finishRace();
    }
  }

  if (STATE.state === 'racing') {
    STATE.lapTime  += clamped;
    STATE.raceTime += clamped;
  }

  // --- Particles ---
  updateParticles(dt);

  // Spawn tire smoke when accelerating hard
  if (STATE.input.accelerate && STATE.speed > 100 && Math.random() < 0.3) {
    spawnSmoke(W / 2 + STATE.steering * 25, H * 0.85, 0.5 + STATE.speed / MAX_SPEED * 0.8);
  }
  // Nitro flames
  if (STATE.nitroActive && Math.random() < 0.7) {
    spawnNitroFlame(W / 2 + (Math.random() - 0.5) * 20, H * 0.88, 0.6);
  }
  // Off-road dust
  if (STATE.offRoad && Math.random() < 0.5) {
    spawnSmoke(W / 2 + (Math.random() - 0.5) * 60, H * 0.8, 0.4);
  }
  // Rumble sparks when near edge
  if (Math.abs(STATE.cameraDx) > halfRoad * 0.7 && Math.abs(STATE.cameraDx) < halfRoad * 0.95 && Math.random() < 0.2) {
    spawnSparks(W / 2 + (STATE.cameraDx > 0 ? 1 : -1) * 100, H * 0.82, 0.3);
  }
}

// =============================================================================
//  RENDERING
// =============================================================================

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, H * 0.55);
  grad.addColorStop(0,    '#0a0a2e');
  grad.addColorStop(0.5,  '#1a1a4e');
  grad.addColorStop(0.85, '#4a6fa5');
  grad.addColorStop(1,    '#87CEEB');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  const sunX = W * 0.75, sunY = H * 0.18, sunR = 30 / RES;
  const glow = ctx.createRadialGradient(sunX, sunY, sunR * 0.5, sunX, sunY, sunR * 3);
  glow.addColorStop(0, 'rgba(255,255,200,0.9)');
  glow.addColorStop(0.5, 'rgba(255,200,100,0.3)');
  glow.addColorStop(1, 'rgba(255,150,50,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(sunX - sunR * 3, sunY - sunR * 3, sunR * 6, sunR * 6);
  ctx.fillStyle = '#fffde0';
  ctx.beginPath(); ctx.arc(sunX, sunY, sunR, 0, Math.PI * 2); ctx.fill();
}

function drawMountains(cameraDx) {
  const horizonY = H * 0.42;
  const parallax = cameraDx * 0.0005;

  // Back mountains
  ctx.fillStyle = '#3a506b';
  ctx.beginPath(); ctx.moveTo(0, H);
  const peaks = 12;
  for (let i = 0; i <= peaks; i++) {
    const x = (i / peaks) * W;
    const nh = Math.sin(i * 1.7 + 0.3) * 25 + Math.sin(i * 3.1 + 1.2) * 15 + 35;
    ctx.lineTo(x + parallax * 30, horizonY - nh / RES + (i % 3 === 0 ? -15 / RES : 0));
  }
  ctx.lineTo(W, H); ctx.closePath(); ctx.fill();

  // Front mountains
  ctx.fillStyle = '#5c7c99';
  ctx.beginPath(); ctx.moveTo(0, H);
  for (let i = 0; i <= peaks; i++) {
    const x = (i / peaks) * W;
    const nh = Math.sin(i * 2.3 + 1.1) * 20 + Math.sin(i * 4.1 + 0.7) * 10 + 25;
    ctx.lineTo(x + parallax * 50, horizonY - 5 / RES - nh / RES);
  }
  ctx.lineTo(W, H); ctx.closePath(); ctx.fill();
}

function drawRoad(cameraZ, cameraDx) {
  const baseIndex = Math.floor(cameraZ / SEGMENT_LEN) % TOTAL_SEGMENTS;
  const segments  = TRACK.segments;

  let prevScreen = null;
  let dx = cameraDx;

  const camSeg   = segments[baseIndex];
  const cameraY  = camSeg.p1.y + CAMERA_H;

  for (let n = 0; n < DRAW_DIST; n++) {
    const idx = (baseIndex + n) % TOTAL_SEGMENTS;
    const seg = segments[idx];
    const worldZ = seg.p1.z;
    const z = worldZ - cameraZ;

    if (z <= 0) { dx += seg.curve; continue; }

    const scale = FIELD_OF_VIEW / z;
    const screenX = W / 2 + (dx * scale);
    const screenY = H / 2 - ((seg.p1.y - cameraY) * scale);
    const screenW = ROAD_WIDTH * scale;

    seg.screen.x = screenX;
    seg.screen.y = screenY;
    seg.screen.w = screenW;
    seg.screen.scale = scale;

    if (prevScreen && prevScreen.y < H) {
      drawSegmentTrapezoid(prevScreen, seg.screen, seg.roadColor, seg.curve, seg.nitro);
    }
    prevScreen = { x: screenX, y: screenY, w: screenW, scale };
    dx += seg.curve;
    if (screenW < 0.3) break;
  }
}

function drawSegmentTrapezoid(prev, curr, roadColor, curve, hasNitro) {
  const topY = curr.y, bottomY = prev.y;
  if (topY >= bottomY) return;

  // Grass
  ctx.fillStyle = '#4a7c3f';
  ctx.fillRect(0, topY, W, bottomY - topY);

  // Road surface
  const roadFill = roadColor === 0 ? '#6b6b6b' : '#4a4a4a';
  ctx.fillStyle = roadFill;
  ctx.beginPath();
  ctx.moveTo(curr.x - curr.w, curr.y);
  ctx.lineTo(curr.x + curr.w, curr.y);
  ctx.lineTo(prev.x + prev.w, prev.y);
  ctx.lineTo(prev.x - prev.w, prev.y);
  ctx.closePath();
  ctx.fill();

  // Nitro pickup glow on road
  if (hasNitro && curr.w > 3) {
    const alpha = 0.4 + Math.sin(performance.now() * 0.005) * 0.2;
    const glowW_curr = curr.w * 0.06;
    const glowW_prev = prev.w * 0.06;
    ctx.fillStyle = `rgba(255, 215, 0, ${alpha})`;
    ctx.beginPath();
    ctx.moveTo(curr.x - glowW_curr, curr.y);
    ctx.lineTo(curr.x + glowW_curr, curr.y);
    ctx.lineTo(prev.x + glowW_prev, prev.y);
    ctx.lineTo(prev.x - glowW_prev, prev.y);
    ctx.closePath();
    ctx.fill();
    // Outer glow
    const outW_curr = curr.w * 0.1;
    const outW_prev = prev.w * 0.1;
    ctx.fillStyle = `rgba(255, 215, 0, ${alpha * 0.4})`;
    ctx.beginPath();
    ctx.moveTo(curr.x - outW_curr, curr.y);
    ctx.lineTo(curr.x + outW_curr, curr.y);
    ctx.lineTo(prev.x + outW_prev, prev.y);
    ctx.lineTo(prev.x - outW_prev, prev.y);
    ctx.closePath();
    ctx.fill();
  }

  // Rumble strips
  const rumW_c = curr.w * 0.08, rumW_p = prev.w * 0.08;
  const rumblePhase = Math.floor(curr.scale * 500) % 2 === 0;

  drawRumble(
    curr.x - curr.w, curr.y,
    curr.x - curr.w + rumW_c, curr.y,
    prev.x - prev.w + rumW_p, prev.y,
    prev.x - prev.w, prev.y,
    rumblePhase
  );
  drawRumble(
    curr.x + curr.w - rumW_c, curr.y,
    curr.x + curr.w, curr.y,
    prev.x + prev.w, prev.y,
    prev.x + prev.w - rumW_p, prev.y,
    !rumblePhase
  );

  // Lane divider
  if (roadColor === 0 && curr.w > 3) {
    const dW_c = curr.w * 0.015, dW_p = prev.w * 0.015;
    ctx.fillStyle = '#cccccc';
    ctx.beginPath();
    ctx.moveTo(curr.x - dW_c, curr.y);
    ctx.lineTo(curr.x + dW_c, curr.y);
    ctx.lineTo(prev.x + dW_p, prev.y);
    ctx.lineTo(prev.x - dW_p, prev.y);
    ctx.closePath();
    ctx.fill();
  }

  // Edge lines
  if (curr.w > 2) {
    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(curr.x - curr.w, curr.y); ctx.lineTo(prev.x - prev.w, prev.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(curr.x + curr.w, curr.y); ctx.lineTo(prev.x + prev.w, prev.y); ctx.stroke();
  }
}

function drawRumble(x1t, y1t, x2t, y2t, x2b, y2b, x1b, y1b, isRed) {
  ctx.fillStyle = isRed ? '#cc3333' : '#f0f0f0';
  ctx.beginPath();
  ctx.moveTo(x1t, y1t); ctx.lineTo(x2t, y2t);
  ctx.lineTo(x2b, y2b); ctx.lineTo(x1b, y1b);
  ctx.closePath(); ctx.fill();
}

// --- Opponent car rendering ---
function drawOpponents(cameraZ, cameraDx) {
  const baseIndex = Math.floor(cameraZ / SEGMENT_LEN) % TOTAL_SEGMENTS;
  const segments  = TRACK.segments;
  const camSeg    = segments[baseIndex];
  const cameraY   = camSeg.p1.y + CAMERA_H;

  // Collect visible opponents
  const visible = [];

  for (const opp of opponents) {
    const oppTrackPos = opp.position % TRACK.totalLength;
    const z = oppTrackPos - (cameraZ % TRACK.totalLength);

    // Handle wrap-around
    let worldZ;
    if (z > TRACK.totalLength / 2) {
      worldZ = cameraZ - (TRACK.totalLength - oppTrackPos); // opponent behind
    } else if (z < -TRACK.totalLength / 2) {
      worldZ = cameraZ + (TRACK.totalLength + oppTrackPos); // opponent ahead (wrapped)
    } else {
      worldZ = cameraZ + z;
    }

    const segIdx = Math.floor(oppTrackPos / SEGMENT_LEN) % TOTAL_SEGMENTS;
    const seg = segments[segIdx];

    const relZ = worldZ - cameraZ;
    if (relZ <= 0 || relZ > DRAW_DIST * SEGMENT_LEN) continue;

    const scale = FIELD_OF_VIEW / relZ;
    if (scale * ROAD_WIDTH < 1) continue;

    const opponentDx = opp.laneOffset * (ROAD_WIDTH / 2);
    const roadY = seg.p1.y;
    const screenX = W / 2 + ((opponentDx - cameraDx) * scale);
    const screenY = H / 2 - ((roadY - cameraY) * scale);
    const screenScale = scale;

    visible.push({
      opp,
      x: screenX,
      y: screenY,
      scale: screenScale,
      zIndex: relZ,
      worldZ,
    });
  }

  // Sort far-to-near
  visible.sort((a, b) => b.zIndex - a.zIndex);

  for (const v of visible) {
    drawOpponentCar(v.x, v.y, v.scale, v.opp.color);
    // Spawn particles behind opponents
    if (Math.random() < 0.15) {
      spawnSmoke(v.x, v.y + 5 * v.scale, v.scale * 0.1);
    }
  }
}

function drawOpponentCar(x, y, scale, color) {
  const s = scale / RES;
  if (s < 0.02) return;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(x, y + 4 * s, 8 * s, 3 * s, 0, 0, Math.PI * 2);
  ctx.fill();
}

//  Wheel 

const wW = 4 * s, wH = 7 * s;
  ctx.fillStyle = '#111';
  ctx.fillRect(x - 8 * s - wW / 2, y - 2 * s, wW, wH);
  ctx.fillRect(x + 8 * s - wW / 2, y - 2 * s, wW, wH);
  ctx.fillRect(x - 7 * s - wW / 2, y - 14 * s, wW, wH);
  ctx.fillRect(x + 7 * s - wW / 2, y - 14 * s, wW, wH);


   // Body
   ctx.fillStyle =color;

   ctx.lineTo(x - 3 * s, y - 16 * s);
   ctx.lineTo(x + 3 * s, y - 16 * s);
   ctx.lineTo(x + 6 * s, y - 12 * s);
   ctx.lineTo(x + 8 * s, y - 3 * s);
   ctx.lineTo(x + 9 * s, y + 4 * s);
   ctx.closePathPath();
   ctx.fill();




   // Windshield

   ctx.fillStyle = '#334455'
   ctx.beginPath();
   ctx.moveTo(x - 5 * s, y - 10 * s);
   ctx.moveTo(x - 2 * s, y - 14 * s);
   ctx.moveTo(x + 2 * s, y - 14 * s);
   ctx.moveTo(x + 5 * s, y - 10 * s);
   ctx.closePath();
   ctx.fill();


   // --- Roadside sprites ---


  function drawSprites(cameraZ, cameraDx) {
    const baseIndex = Math.floor(cameraZ / SEGMENT_LEN) % TOTAL_SEGMENTS;
     const segments  = TRACK.segments;

     let dx = cameraDx;
     const camSeg   = segments[baseIndex];
     const cameraY  = camSeg.p1.y + CAMERA_H;

     const visibleSprites = [];


     for (let n = 0; n < DRAW_DIST; n++) {
    const idx = (baseIndex + n) % TOTAL_SEGMENTS;
    const seg = segments[idx]; 

    const z = seg.p1.z - cameraZ;
    if (z <= 0) { dx += seg.curve; continue; }


    const scale = FIELD_OF_VIEW / z;
    if (seg.screen.w < 1) { dx += seg.curve; continue; }

    const screenY = H / 2 - ((seg.p1.y - cameraY) * scale);
    

    for (const sprite of seg.sprites) {
      const spriteWorldX = sprite.offset * (ROAD_WIDTH / 2);
      const spriteScreenX = W / 2 + ((spriteWorldX + dx) * scale);
      visibleSprites.push({
        type: sprite.type, x: spriteScreenX, y: screenY,
        scale: scale, zIndex: z,
      });
    }
    dx += seg.curve;
  }


  visibleSprites.sort((a, b) => b.zIndex - a.zIndex);

  for (const sprite of visibleSprites) {
    drawSprite(sprite.type, sprite.x, sprite.y, sprite.scale);
  }
}


function drawSprite(type, x, y, scale) {
  const s = scale / RES;
  switch (type) {
    case 'tree': {
      const tw = 8 * s, th = 30 * s, cr = 20 * s;
      ctx.fillStyle = '#5c3a1e'; ctx.fillRect(x - tw / 2, y - th, tw, th);
      ctx.fillStyle = '#2d6b2d';
      ctx.beginPath();
      ctx.moveTo(x, y - th - cr * 1.5);
      ctx.lineTo(x - cr, y - th + cr * 0.3);
      ctx.lineTo(x + cr, y - th + cr * 0.3);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#3a7d3a';
      ctx.beginPath(); ctx.arc(x, y - th - cr * 0.3, cr * 0.8, 0, Math.PI * 2); ctx.fill();
      break;
    }

     case 'bush': {
      const r = 12 * s;
      ctx.fillStyle = '#3a7d3a';
      ctx.beginPath(); ctx.arc(x, y - r * 0.5, r, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#4a8d4a';
      ctx.beginPath(); ctx.arc(x + r * 0.3, y - r * 0.6, r * 0.6, 0, Math.PI * 2); ctx.fill();
      break;
    }


    case 'sign': {
      const pw = 3 * s, ph = 25 * s, bw = 14 * s, bh = 10 * s;
      ctx.fillStyle = '#888'; ctx.fillRect(x - pw / 2, y - ph, pw, ph);
      ctx.fillStyle = '#fff'; ctx.fillRect(x - bw / 2, y - ph - bh, bw, bh);
      ctx.fillStyle = '#333'; ctx.fillRect(x - bw * 0.3, y - ph - bh * 0.75, bw * 0.6, bh * 0.4);
      ctx.beginPath();
      ctx.moveTo(x + bw * 0.15, y - ph - bh * 0.8);
      ctx.lineTo(x + bw * 0.35, y - ph - bh * 0.4);
      ctx.lineTo(x + bw * 0.15, y - ph - bh * 0.1);
      ctx.closePath(); ctx.fill();
      break;
    }
  }
}
